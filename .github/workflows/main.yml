name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  HUGO_ENV: production
  HUGO_VERSION: "0.124.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          curl -LO "https://github.com/gohugoio/hugo/releases/download/v${{ env.HUGO_VERSION }}/hugo_extended_${{ env.HUGO_VERSION }}_linux-amd64.tar.gz"
          tar -xvf hugo_extended_${{ env.HUGO_VERSION }}_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Install npm dependencies
        run: npm install

      - name: Link theme
        run: mkdir -p exampleSite/themes && ln -s $GITHUB_WORKSPACE exampleSite/themes/academia-hugo

      - name: Build site
        run: cd exampleSite && hugo --gc --minify --buildDrafts --buildExpired --buildFuture --forceSyncStatic

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./exampleSite/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
